<VirtualHost *:443>
    ServerName sf-mgt.psi.ch

    SSLEngine on
    SSLCertificateFile /etc/pki/tls/certs/myservice.crt
    SSLCertificateKeyFile /etc/pki/tls/private/myservice.key

    ProxyPreserveHost On
    ProxyPass        / http://127.0.0.1:8080/
    ProxyPassReverse / http://127.0.0.1:8080/

    <Location />
        AuthType Basic
        AuthName "SwissFEL User Services"
        AuthBasicProvider PAM
        AuthPAMService httpd-user-service
        Require valid-user
    </Location>

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"
    RequestHeader set X-Remote-User %{REMOTE_USER}s
</VirtualHost>